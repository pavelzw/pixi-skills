[workspace]
name = "pixi-skills"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]
preview = ["pixi-build"]

[package]
name = "pixi-skills"
[package.build.backend]
name = "pixi-build-python"
version = "*"
[package.host-dependencies]
python = ">=3.13"
hatchling = "*"
[package.run-dependencies]
typer = ">=0.12"
rich = ">=13"
questionary = ">=2"
pyyaml = ">=6"

[dependencies]
pixi-skills = { path = "." }

[feature.test.dependencies]
pytest = "*"
pytest-cov = "*"
ty = "*"
pytest-mock = ">=3.15.1,<4"
[feature.test.tasks]
test = "pytest"
test-coverage = "pytest --cov=pixi_skills --cov-report=xml --cov-report=term-missing"

[feature.build.dependencies]
python = "*"
hatchling = "*"
python-build = "*"
twine = ">=6"
[feature.build.tasks]
build-wheel = "python -m build --no-isolation ."
check-wheel = "twine check dist/*"

[feature.lint.dependencies]
lefthook = "*"
docformatter = "*"
ruff = "*"
taplo = "*"
pre-commit-hooks = "*"
typos = "*"
zizmor = "*"
[feature.lint.tasks]
pre-commit-install = "lefthook install"
lint = "lefthook run pre-commit --all-files"

[feature.py313.dependencies]
python = "3.13.*"
[feature.py314.dependencies]
python = "3.14.*"

[environments]
default = ["test", "build", "lint"]
py313 = ["py313", "test"]
py314 = ["py314", "test"]
